<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Convite Especial</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<section id="tela0" class="tela ativa">
    <canvas id="fireCanvas"></canvas>

    <div class="intro-texto" id="introTexto">
        <h1>Seja Bem vinda Rita</h1>
        <p>(Sinta-se a vontade de ler e acessar as coisas)</p>
    </div>

    <button id="btnIntro">
        Juro solenemente não fazer nada de bom.
    </button>
</section>


<section id="tela1" class="tela">
    <div class="container">
      <h1 class="titulo" id="titulo">
    Rita você aceita sair comigo?
      </h1>


        <div class="area-botoes">
            <button id="nao">Não obrigado</button>
            <button id="sim">Aceito sair com você</button>
        </div>
    </div>
</section>

<script src="script.js"></script>

<section id="tela2" class="tela">
    <div class="container">
        <h1 class="titulo">
            Que tal uma aventura pelo Olimpo ou acampamento meio sangue?
        </h1>

        <div class="pergunta-box">
            <p class="pergunta">
                Em qual local da grande capital podemos comemorar esse evento histórico?
            </p>

            <div class="opcoes">
                <label class="radio-option">
                    <input type="radio" name="local" value="Museu Oscar Niemeyer">
                    <span></span>
                    Museu Oscar Niemeyer
                </label>

                <label class="radio-option">
                    <input type="radio" name="local" value="Museu Egípcio">
                    <span></span>
                    Museu Egípcio
                </label>

                <label class="radio-option">
                    <input type="radio" name="local" value="Outro">
                    <span></span>
                    Outro
                </label>
            </div>

            <button id="confirmarEscolha">Confirmar escolha</button>
        </div>
    </div>
</section>

</body>
</html>
